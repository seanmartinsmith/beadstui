version: 2

project_name: bt

builds:
  - main: ./cmd/bt
    binary: bt
    ldflags:
      - -s -w
      # .Tag carries the v-prefix in both snapshot ({{.Tag}} = v0.0.0 or
      # latest-tag) and release modes (real tag like v0.1). Using .Version
      # caused a double-v in snapshot mode because goreleaser v2's snapshot
      # semantics prepend v to .Version while the template added another.
      - -X github.com/seanmartinsmith/beadstui/pkg/version.version={{.Tag}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Homebrew tap + Scoop bucket publishing intentionally omitted for pre-v1
# releases. Channels will reopen once bt hits the subjective v1 bar
# (dogfood-clean TUI, feature-complete). Re-enable checklist:
#   1. Create seanmartinsmith/homebrew-tap and seanmartinsmith/scoop-bucket repos
#   2. Add HOMEBREW_TAP_GITHUB_TOKEN repo secret with write scope to both
#   3. Restore brews: and scoops: blocks (see git history pre-bt-brid close
#      for the last working config, and migrate brews -> homebrew_casks per
#      goreleaser v2 direction)
#   4. Restore HOMEBREW_TAP_GITHUB_TOKEN env in .github/workflows/release.yml
# Tracked by bt-brid (decision) and the re-enable follow-up bead.
