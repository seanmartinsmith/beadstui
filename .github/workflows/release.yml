name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          # Pinned to the v2.15 minor line so a future goreleaser major
          # release doesn't break CI without notice. Bump deliberately
          # after smoke-testing locally against the new version.
          version: "~> v2.15"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_GITHUB_TOKEN removed: brew/scoop publishing stripped
          # from .goreleaser.yaml pre-v1 (see bt-brid). Restore alongside
          # the brews:/scoops: blocks when those channels reopen.
